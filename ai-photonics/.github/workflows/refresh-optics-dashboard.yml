name: Refresh Optics Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 2-6"
  push:
    branches:
      - main
    paths:
      - "results.tsv"
      - "company-metrics.js"
      - "package.json"
      - "package-lock.json"
      - "scripts/generate-optics-dashboard-data.mjs"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh static dashboard data
        run: npm run refresh:dashboard

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- optics-dashboard-data.js; then
            echo "No dashboard data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optics-dashboard-data.js
          git commit -m "chore: refresh optics dashboard data"
          git push
