<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Photonics Chokepoint Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#080b12;color:#c9d1d9;overflow-x:hidden}
canvas{display:block}
#tooltip{position:fixed;display:none;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 18px;max-width:340px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:1000;pointer-events:none;font-size:13px;line-height:1.5}
#tooltip h3{font-size:15px;color:#f0f6fc;margin-bottom:2px}
#tooltip .sub{font-size:11px;color:#8b949e;margin-bottom:8px}
#tooltip .tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-right:4px}
.tag-buy{background:#23863620;color:#3fb950;border:1px solid #238636}
.tag-hold{background:#30363d50;color:#c9d1d9;border:1px solid #30363d}
.tag-avoid{background:#f8514920;color:#f85149;border:1px solid #da3633}
.tag-choke{background:#d2992220;color:#e3b341;border:1px solid #d29922}
.tag-mono{background:#f8514920;color:#ff7b72;border:1px solid #f85149}
#tooltip .thesis{margin-top:6px;font-size:12px;color:#8b949e}
#tooltip .metrics{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
#tooltip .m{background:#0d1117;border-radius:4px;padding:4px 8px}
#tooltip .m .v{font-weight:700;color:#58a6ff;font-size:13px}
#tooltip .m .l{font-size:9px;color:#8b949e;text-transform:uppercase}
#ui{position:fixed;top:16px;left:16px;z-index:100;display:flex;flex-direction:column;gap:8px}
#ui h1{font-size:18px;font-weight:700;color:#f0f6fc;text-shadow:0 2px 8px rgba(0,0,0,.5)}
#ui p{font-size:11px;color:#8b949e;max-width:280px}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#8b949e}
.legend-dot{width:10px;height:10px;border-radius:50%}
#flow-label{position:fixed;right:20px;top:50%;transform:translateY(-50%) rotate(90deg);font-size:11px;color:#30363d;letter-spacing:4px;text-transform:uppercase;z-index:50}
</style>
</head>
<body>
<div id="ui">
  <h1>AI Photonics Chokepoint Map</h1>
  <p>Size = market dominance. Red glow = monopoly bottleneck. Hover to explore upstream/downstream connections.</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div>BUY</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8b949e"></div>HOLD</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f85149;opacity:.5"></div>AVOID</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff7b72;box-shadow:0 0 8px #f85149"></div>Monopoly</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e3b341;box-shadow:0 0 6px #d29922"></div>Chokepoint</div>
  </div>
</div>
<div id="flow-label">RAW MATERIALS &rarr; SUBSTRATES &rarr; FOUNDRY &rarr; COMPONENTS &rarr; MODULES &rarr; SYSTEMS &rarr; DATA CENTERS</div>
<div id="tooltip"></div>
<canvas id="c"></canvas>
<script>
const W=()=>window.innerWidth,H=()=>window.innerHeight;
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');
let nodes=[],edges=[],hoveredNode=null,mx=0,my=0;

const LAYERS=[
  {y:.06,label:"Raw Materials"},
  {y:.14,label:"Substrates"},
  {y:.22,label:"Equipment"},
  {y:.32,label:"Foundry"},
  {y:.42,label:"Lasers & ICs"},
  {y:.54,label:"Transceivers"},
  {y:.66,label:"Assembly & Packaging"},
  {y:.76,label:"Fiber & Connectors"},
  {y:.86,label:"Networking & Switches"},
  {y:.95,label:"Test / OCS / Infrastructure"}
];

function init(){
  // Layer 0: Raw Materials
  addNode("5N Plus","VNP.TO",0,.5,61,"HOLD",false,false,"Refines In/Ga/Ge for all compound semi","$391M rev","Canada");

  // Layer 1: Substrates
  addNode("Soitec","SOI.PA",1,.2,65,"HOLD",true,true,"ONLY volume photonics-SOI supplier for Tower/GF/TSMC","70% SOI share","France");
  addNode("AXT","AXTI",1,.4,47,"AVOID",true,true,"60-70% InP substrates. Beijing manufacturing risk","60-70% InP","US/China");
  addNode("JX Metals","5016.T",1,.6,66,"HOLD",true,false,"Newly IPO'd Japanese InP. Non-China alternative","40yr InP exp","Japan");
  addNode("IntelliEPI","8258.TW",1,.8,62,"HOLD",false,false,"Taiwan InP epiwafer + EZconn CPO","53.8% growth","Taiwan");

  // Layer 2: Equipment
  addNode("Aixtron","AIXA.DE",2,.15,65,"HOLD",true,true,"70-90% MOCVD. Grows every laser chip","70-90% MOCVD","Germany");
  addNode("Veeco","VECO",2,.35,63,"HOLD",true,false,"MOCVD duopoly. Lumina+ for photonics","MOCVD #2","US");
  addNode("ASML","ASML",2,.55,68,"HOLD",true,true,"Lithography monopoly for all SiPh","100% litho","Netherlands");
  addNode("Disco","6146.T",2,.75,72,"HOLD",true,true,"75% dicing. Every chip needs Disco","75% dicing","Japan");
  addNode("Besi","BESI.AS",2,.92,73,"HOLD",true,false,"42% die-attach. Hybrid bonding pioneer","42% die-attach","Netherlands");

  // Layer 3: Foundry
  addNode("Tower Semi","TSEM",3,.25,75,"BUY",true,true,"85% SiPh foundry. TSMC of photonics. 5x expansion","85% SiPh","Israel/US");
  addNode("GlobalFoundries","GFS",3,.5,62,"HOLD",false,false,"#2 SiPh. AMF acquired. China-free","#2 SiPh","US");
  addNode("WIN Semi","3105.TW",3,.75,64,"HOLD",true,false,"50%+ GaAs foundry for VCSELs","50%+ GaAs","Taiwan");

  // Layer 4: Lasers & ICs
  addNode("Lumentum","LITE",4,.08,70,"HOLD",true,true,"50-60% high-end EML. NVIDIA $2B. S&P 500","50-60% EML","US");
  addNode("MACOM","MTSI",4,.2,76,"BUY",false,false,"Analog IC in every transceiver. 57% GM","57% GM, DC+48%","US");
  addNode("Credo","CRDO",4,.34,82,"BUY",true,true,"88% AEC monopoly. 68% GM. 53% pullback","88% AEC","US");
  addNode("Broadcom","AVGO",4,.48,85,"BUY",true,true,"Tomahawk monopoly. Taurus DSP. 68% EBITDA","90% switch ASIC","US");
  addNode("Marvell","MRVL",4,.62,79,"BUY",false,false,"Celestial AI + Ara DSP + 50+ custom programs","$3.25B Celestial","US");
  addNode("Semtech","SMTC",4,.76,70,"HOLD",false,false,"LPO disruptor. FiberEdge TIA. DC +50%","LPO architecture","US");
  addNode("Mitsubishi","6503.T",4,.9,55,"HOLD",true,false,"50% total EML volume globally","50% EML","Japan");

  // Layer 5: Transceivers
  addNode("Innolight","300308.SZ",5,.2,79,"BUY",true,true,"World #1. 50%+ NVIDIA. 43% GM","50%+ NVIDIA","China");
  addNode("Coherent","COHR",5,.4,65,"HOLD",false,false,"3 architectures. NVIDIA $2B. Thermadite","$6.3B TTM","US");
  addNode("AAOI","AAOI",5,.6,59,"HOLD",false,false,"US mfg dark horse. Zero debt. $200M+ 1.6T order","US manufacturing","US");
  addNode("Eoptolink","300502.SZ",5,.8,68,"HOLD",false,false,"China #2. +179% growth","$50B cap","China");

  // Layer 6: Assembly
  addNode("Fabrinet","FN",6,.15,71,"HOLD",true,false,"NVIDIA sole-source 1.6T. $961M cash, zero debt","NVIDIA sole-src","Thailand");
  addNode("Celestica","CLS",6,.35,74,"HOLD",true,false,"55% custom switch mfg. $17B FY26. 0.7x sales","55% custom sw","Canada");
  addNode("ASE","3711.TW",6,.55,70,"HOLD",false,false,"#1 OSAT. SiPh packaging. Lightmatter CPO","#1 OSAT","Taiwan");
  addNode("TFC Optical","300394.SZ",6,.75,64,"HOLD",false,false,"Chinese Fabrinet. OSA packaging bridge","$35B cap","China");
  addNode("Foxconn","2317.TW",6,.92,62,"HOLD",false,false,"World's largest AI server maker. $248B","$248B rev","Taiwan");

  // Layer 7: Fiber & Connectors
  addNode("Corning","GLW",7,.2,72,"HOLD",true,false,"Fiber backbone. $6.3B optical. Meta $6B deal",">50% NA fiber","US");
  addNode("Amphenol","APH",7,.45,78,"BUY",true,false,"33% AI DC connector share. $23.1B +52%","33% AI DC conn","US");
  addNode("Fujikura","5803.T",7,.7,68,"HOLD",false,false,"Japanese Corning. +160% in 2025. 3x US output","3x US output","Japan");
  addNode("Prysmian","PRY.MI",7,.9,60,"HOLD",false,false,"Hollow-core fiber 50% faster. Long-term","HCF 50% faster","Italy");

  // Layer 8: Networking
  addNode("Arista","ANET",8,.2,83,"BUY",true,false,"Demand signal. 64% GM. $10.7B cash. AI +100%","40%+ 800G","US");
  addNode("Ciena","CIEN",8,.45,69,"HOLD",false,false,"WaveLogic 6. $5B backlog. OCS expanding","$5B backlog","US");
  addNode("Cisco","CSCO",8,.7,68,"HOLD",false,false,"$5B AI orders. Acacia ~50% coherent","Acacia ~50%","US");
  addNode("Nokia","NOK",8,.9,60,"HOLD",false,false,"Infinera InP + Nokia SiPh. 70% TCO reduction","~20% optical","Finland");

  // Layer 9: Test/OCS/Infra
  addNode("VIAV","VIAV",9,.12,69,"HOLD",false,false,"Cheapest AI photonics at 5x sales","$1.24B +36%","US");
  addNode("Advantest","6857.T",9,.28,71,"HOLD",true,false,"ASML of testing. V93000 SiPh. JPY1.07T","ATE duopoly","Japan");
  addNode("Teradyne","TER",9,.44,72,"HOLD",true,false,"ATE #2. Quantifi Photonics PIC testing","AI 70% rev","US");
  addNode("Huber+Suhner","HUBN.SW",9,.6,58,"HOLD",true,false,"Polatis OCS. Market $2.5B by 2029","OCS leader","Switzerland");
  addNode("Japan Pure Chem","4973.T",9,.76,63,"HOLD",true,true,"50% gold plating. 52 employees. 2.1x sales","50% gold plating","Japan");
  addNode("Vertiv","VRT",9,.92,72,"HOLD",false,false,"$15B backlog. NVIDIA cooling. +252% orders","$15B backlog","US");

  // EDGES: supply relationships
  // Raw → Substrates
  addEdge("VNP.TO","SOI.PA"); addEdge("VNP.TO","AXTI"); addEdge("VNP.TO","5016.T");
  // Substrates → Foundry (critical chokepoint flow)
  addEdge("SOI.PA","TSEM",true); addEdge("SOI.PA","GFS"); addEdge("AXTI","LITE"); addEdge("AXTI","6503.T"); addEdge("5016.T","LITE");
  // Equipment → Foundry
  addEdge("AIXA.DE","LITE"); addEdge("AIXA.DE","COHR"); addEdge("AIXA.DE","3105.TW");
  addEdge("ASML","TSEM"); addEdge("ASML","GFS"); addEdge("6146.T","TSEM"); addEdge("6146.T","GFS");
  addEdge("BESI.AS","3711.TW"); addEdge("BESI.AS","TSEM");
  // Foundry → Components
  addEdge("TSEM","AVGO",true); addEdge("TSEM","COHR"); addEdge("TSEM","300308.SZ");
  addEdge("GFS","AVGO"); addEdge("GFS","MRVL");
  addEdge("3105.TW","LITE");
  // Components → Transceivers
  addEdge("LITE","300308.SZ",true); addEdge("LITE","COHR"); addEdge("LITE","AAOI");
  addEdge("MTSI","300308.SZ"); addEdge("MTSI","COHR"); addEdge("MTSI","AAOI");
  addEdge("CRDO","ANET",true); addEdge("CRDO","300308.SZ");
  addEdge("AVGO","ANET",true); addEdge("AVGO","300308.SZ");
  addEdge("MRVL","300308.SZ"); addEdge("MRVL","COHR");
  addEdge("SMTC","300308.SZ"); addEdge("SMTC","COHR");
  addEdge("6503.T","300308.SZ");
  // Transceivers → Assembly
  addEdge("300308.SZ","FN"); addEdge("COHR","FN"); addEdge("AAOI","FN");
  addEdge("300308.SZ","300394.SZ"); addEdge("300502.SZ","300394.SZ");
  // Assembly → Networking
  addEdge("FN","ANET"); addEdge("CLS","ANET"); addEdge("2317.TW","ANET");
  addEdge("FN","CIEN"); addEdge("CLS","CSCO");
  // Fiber → Networking
  addEdge("GLW","ANET"); addEdge("GLW","CIEN"); addEdge("APH","ANET"); addEdge("APH","CIEN");
  // Test/materials → everything
  addEdge("4973.T","300308.SZ"); addEdge("4973.T","FN");
}

function addNode(name,ticker,layer,xFrac,score,verdict,chokepoint,monopoly,thesis,share,market){
  const ly=LAYERS[layer];
  nodes.push({name,ticker,layer,xFrac,yFrac:ly.y,score,verdict,chokepoint,monopoly,thesis,share,market,
    x:0,y:0,r:0,vx:0,vy:0});
}
function addEdge(from,to,critical){edges.push({from,to,critical:!!critical})}

function layout(){
  canvas.width=W(); canvas.height=H();
  const pad=160,w=canvas.width-pad*2,h=canvas.height-40;
  nodes.forEach(n=>{
    n.x=pad+n.xFrac*w;
    n.y=20+n.yFrac*h;
    const base=n.monopoly?18:n.chokepoint?14:n.verdict==='BUY'?13:9;
    n.r=base*(canvas.width/1600);
  });
}

function getColor(n,alpha=1){
  if(n.verdict==='BUY') return `rgba(63,185,80,${alpha})`;
  if(n.verdict==='AVOID') return `rgba(248,81,73,${alpha*.5})`;
  return `rgba(139,148,158,${alpha})`;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw layer labels
  ctx.font='10px system-ui';ctx.fillStyle='#21262d';ctx.textAlign='left';
  LAYERS.forEach(l=>{
    const y=20+l.y*(canvas.height-40);
    ctx.fillStyle='#21262d33';
    ctx.fillRect(0,y-1,canvas.width,1);
    ctx.fillStyle='#30363d';
    ctx.fillText(l.label,8,y+3);
  });

  // Draw edges
  const hovTickers=new Set();
  if(hoveredNode){
    hovTickers.add(hoveredNode.ticker);
    edges.forEach(e=>{
      if(e.from===hoveredNode.ticker) hovTickers.add(e.to);
      if(e.to===hoveredNode.ticker) hovTickers.add(e.from);
    });
  }

  edges.forEach(e=>{
    const a=nodes.find(n=>n.ticker===e.from);
    const b=nodes.find(n=>n.ticker===e.to);
    if(!a||!b) return;
    const highlighted=hoveredNode && (hovTickers.has(a.ticker)||hovTickers.has(b.ticker)) && (e.from===hoveredNode.ticker||e.to===hoveredNode.ticker);
    ctx.beginPath();
    const cy1=a.y+a.r+4, cy2=b.y-b.r-4;
    const cmy=(cy1+cy2)/2;
    ctx.moveTo(a.x,cy1);
    ctx.bezierCurveTo(a.x,cmy,b.x,cmy,b.x,cy2);
    ctx.strokeStyle=highlighted?(e.critical?'rgba(248,81,73,.6)':'rgba(88,166,255,.5)'):
      (e.critical?'rgba(248,81,73,.1)':'rgba(48,54,61,.3)');
    ctx.lineWidth=highlighted?(e.critical?2.5:1.5):(e.critical?1:.5);
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n=>{
    const isHov=hoveredNode && hoveredNode.ticker===n.ticker;
    const isConn=hoveredNode && hovTickers.has(n.ticker);
    const dim=hoveredNode && !isConn;
    const alpha=dim?.15:1;

    // Glow for monopoly/chokepoint
    if(n.monopoly && !dim){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+6,0,Math.PI*2);
      const g=ctx.createRadialGradient(n.x,n.y,n.r,n.x,n.y,n.r+10);
      g.addColorStop(0,'rgba(248,81,73,.3)');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fill();
    } else if(n.chokepoint && !dim){
      ctx.beginPath();ctx.arc(n.x,n.y,n.r+4,0,Math.PI*2);
      const g=ctx.createRadialGradient(n.x,n.y,n.r,n.x,n.y,n.r+8);
      g.addColorStop(0,'rgba(210,153,34,.25)');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.fill();
    }

    // Node circle
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=n.monopoly?`rgba(248,81,73,${alpha*.3})`:
      n.chokepoint?`rgba(210,153,34,${alpha*.2})`:
      `rgba(22,27,34,${alpha})`;
    ctx.fill();
    ctx.strokeStyle=n.monopoly?`rgba(248,81,73,${alpha})`:
      n.chokepoint?`rgba(210,153,34,${alpha})`:
      getColor(n,alpha*.7);
    ctx.lineWidth=isHov?2.5:(n.monopoly?2:1);
    ctx.stroke();

    // Ticker label
    ctx.font=`${isHov?'bold ':''}${n.r<10?'8':'9'}px system-ui`;
    ctx.fillStyle=n.monopoly?`rgba(255,123,114,${alpha})`:
      n.chokepoint?`rgba(227,179,65,${alpha})`:
      n.verdict==='BUY'?`rgba(63,185,80,${alpha})`:
      `rgba(201,209,217,${alpha})`;
    ctx.textAlign='center';
    ctx.fillText(n.ticker,n.x,n.y+n.r+12);

    // Score badge
    if(n.r>=10 && !dim){
      ctx.font='bold 8px system-ui';
      ctx.fillStyle=`rgba(240,246,252,${alpha})`;
      ctx.fillText(n.score,n.x,n.y+3);
    }
  });

  requestAnimationFrame(draw);
}

function handleMove(e){
  mx=e.clientX;my=e.clientY;
  let found=null;
  for(const n of nodes){
    const dx=mx-n.x,dy=my-n.y;
    if(dx*dx+dy*dy<(n.r+4)*(n.r+4)){found=n;break;}
  }
  hoveredNode=found;
  canvas.style.cursor=found?'pointer':'default';
  if(found){
    let tags='';
    const vt=found.verdict==='BUY'?'tag-buy':found.verdict==='AVOID'?'tag-avoid':'tag-hold';
    tags+=`<span class="tag ${vt}">${found.verdict} ${found.score}/100</span>`;
    if(found.monopoly) tags+='<span class="tag tag-mono">MONOPOLY</span>';
    else if(found.chokepoint) tags+='<span class="tag tag-choke">CHOKEPOINT</span>';

    // Find connections
    const up=[],down=[];
    edges.forEach(e=>{
      if(e.to===found.ticker){const n=nodes.find(x=>x.ticker===e.from);if(n)up.push(n.ticker);}
      if(e.from===found.ticker){const n=nodes.find(x=>x.ticker===e.to);if(n)down.push(n.ticker);}
    });
    let connHtml='';
    if(up.length) connHtml+=`<div style="margin-top:6px;font-size:11px;color:#8b949e">Suppliers: <span style="color:#58a6ff">${up.join(', ')}</span></div>`;
    if(down.length) connHtml+=`<div style="font-size:11px;color:#8b949e">Customers: <span style="color:#58a6ff">${down.join(', ')}</span></div>`;

    tooltip.innerHTML=`<h3>${found.ticker} &mdash; ${found.name}</h3>
      <div class="sub">${found.market} | ${found.share}</div>
      ${tags}
      <div class="thesis">${found.thesis}</div>
      ${connHtml}`;
    tooltip.style.display='block';
    let tx=mx+16,ty=my-10;
    if(tx+350>W()) tx=mx-360;
    if(ty+200>H()) ty=H()-220;
    tooltip.style.left=tx+'px';tooltip.style.top=ty+'px';
  } else {
    tooltip.style.display='none';
  }
}

canvas.addEventListener('mousemove',handleMove);
window.addEventListener('resize',layout);
init();layout();draw();
</script>
</body>
</html>
