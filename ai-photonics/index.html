<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Photonics Supply Chain - Chokepoint Analysis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#080b12;color:#c9d1d9;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:#0d1117;border-bottom:1px solid #21262d;height:48px;flex-shrink:0}
.top-bar h1{font-size:16px;font-weight:700;color:#f0f6fc}
.top-bar .info{font-size:11px;color:#484f58}
.tabs{display:flex;gap:0;height:100%;align-items:stretch}
.tab{padding:0 20px;display:flex;align-items:center;cursor:pointer;font-size:13px;font-weight:500;color:#8b949e;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab:hover{color:#c9d1d9;background:#161b2240}
.tab.active{color:#f0f6fc;border-bottom-color:#58a6ff;background:#161b2280}
.tab .icon{margin-right:8px;font-size:16px}
iframe{flex:1;border:none;width:100%}
</style>
</head>
<body>
<div class="top-bar">
  <h1>AI Photonics Supply Chain</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('dashboard',this)"><span class="icon">&#9638;</span>Optics Dashboard</div>
    <div class="tab" onclick="switchTab('network',this)"><span class="icon">&#9678;</span>Network Map</div>
    <div class="tab" onclick="switchTab('layers',this)"><span class="icon">&#9776;</span>Layer View</div>
    <div class="tab" onclick="switchTab('economics',this)"><span class="icon">&#9701;</span>Economics Scatter</div>
  </div>
  <div class="info">146 companies &middot; grouped dashboard &middot; supply chain maps &middot; economics view</div>
</div>
<iframe id="view" src="optics-dashboard.html"></iframe>
<script>
function switchTab(view, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const pages = {
    dashboard: 'optics-dashboard.html',
    network: 'chokepoint-map.html',
    layers: 'supply-chain-map.html',
    economics: 'chokepoint-economics-map.html'
  };
  document.getElementById('view').src = pages[view] || pages.network;
}
</script>
</body>
</html>
