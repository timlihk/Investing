function renderChain(filter) {
  const chain = document.getElementById('chain');
  chain.innerHTML = '';
  layers.forEach((layer, li) => {
    let companies = layer.companies;
    if (filter === 'buy') companies = companies.filter(c => c.verdict === 'BUY');
    else if (filter === 'chokepoint') companies = companies.filter(c => c.chokepoint || c.monopoly);
    else if (filter === 'undiscovered') companies = companies.filter(c => c.undiscovered);
    if (companies.length === 0 && filter !== 'all') return;

    if (li > 0) {
      const arrow = document.createElement('div');
      arrow.className = 'flow-arrow';
      arrow.innerHTML = '&#8595;';
      chain.appendChild(arrow);
    }

    const row = document.createElement('div');
    row.className = 'layer';
    row.innerHTML = `
      <div class="layer-label">
        <h3>${layer.name}</h3>
        <span>${layer.desc}</span>
      </div>
      <div class="layer-companies">
        ${companies.map(c => {
          let cls = c.verdict === 'BUY' ? 'buy' : c.verdict === 'AVOID' ? 'avoid' : 'hold';
          if (c.monopoly) cls += ' monopoly';
          else if (c.chokepoint) cls += ' chokepoint';
          return `<div class="company ${cls}" onclick='showDetail(${JSON.stringify(c).replace(/'/g, "\\'")})'>
            <span class="ticker">${c.ticker}</span>
            <span class="score">${c.score}</span>
            ${c.share ? `<span class="share">${c.share}</span>` : ''}
          </div>`;
        }).join('')}
      </div>
    `;
    chain.appendChild(row);
  });
}

function showDetail(c) {
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('overlay');
  const verdictTag = c.verdict === 'BUY' ? 'tag-buy' : c.verdict === 'AVOID' ? 'tag-avoid' : 'tag-hold';
  let tags = `<span class="tag ${verdictTag}">${c.verdict} (${c.score}/100)</span>`;
  if (c.monopoly) tags += '<span class="tag tag-monopoly">MONOPOLY</span>';
  else if (c.chokepoint) tags += '<span class="tag tag-chokepoint">CHOKEPOINT</span>';
  if (c.undiscovered) tags += '<span class="tag" style="background:rgba(88,166,255,0.15);color:#58a6ff;border:1px solid #58a6ff">UNDER-DISCOVERED</span>';

  let metricsHtml = '';
  if (c.metrics) {
    metricsHtml = '<div class="metric-grid">' + Object.entries(c.metrics).map(([k,v]) =>
      `<div class="metric"><div class="val">${v}</div><div class="lbl">${k}</div></div>`
    ).join('') + '</div>';
  }

  document.getElementById('panel-content').innerHTML = `
    <h2>${c.ticker} &mdash; ${c.name}</h2>
    <div class="subtitle">${c.market}</div>
    <div style="margin-bottom:16px">${tags}</div>
    ${metricsHtml}
    <div class="section">
      <h4>Thesis</h4>
      <p>${c.thesis}</p>
    </div>
    ${c.upside ? `<div class="section"><h4>Target / Entry</h4><p>${c.upside}</p></div>` : ''}
  `;
  panel.classList.add('open');
  overlay.classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function setActive(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function filterAll() { setActive(event.target); renderChain('all'); }
function filterBuy() { setActive(event.target); renderChain('buy'); }
function filterChokepoint() { setActive(event.target); renderChain('chokepoint'); }
function filterUnderDiscovered() { setActive(event.target); renderChain('undiscovered'); }

renderChain('all');
